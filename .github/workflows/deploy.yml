name: Deploy to VPS

on:
  push:
    branches:
      - main  # This triggers the action only when pushing to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Debug SSH key format
        shell: bash
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_rsa <<'EOF'
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null && echo "Private key is valid" || (echo "Invalid private key format" && exit 1)

      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            whoami
