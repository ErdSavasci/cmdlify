name: Deploy to VPS

on:
  push:
    branches:
      - main  # This triggers the action only when pushing to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Debug SSH key format
        shell: bash
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null && echo "Private key is valid" || (echo "Invalid private key format" && exit 1)

      - name: Prepare SSH key
        id: prep_key
        shell: bash
        run: |
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > /tmp/vps_key
          chmod 600 /tmp/vps_key
          ssh-keygen -y -f /tmp/vps_key > /dev/null

      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: /tmp/vps_key
          debug: true
          script: |
            cd /home/wasadmin/019-CMDLIFY
            chmod +x ./update.sh
            ./update.sh
